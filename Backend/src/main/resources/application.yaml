# .env ở thư mục gốc repo (MLNProject/.env), không phải Backend/
springdotenv:
  directory: ..
  filename: .env
  ignore-if-missing: true

# false = tắt Basic Auth khi dev/test API (Postman). Production: đặt true hoặc APP_SECURITY_ENABLED=true
app:
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  libreoffice:
    enabled: true
    path: ${LIBREOFFICE_PATH:C:/Program Files/LibreOffice/program/soffice.exe}
    convert-timeout-seconds: 120

cloudinary:
  cloud:
    name: ${CLOUDINARY_CLOUD_NAME:}
  api:
    key: ${CLOUDINARY_API_KEY:}
    secret: ${CLOUDINARY_API_SECRET:}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: web-sales-backend

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
            scope:
              - email
              - profile
              
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mln_database}?sslMode=${MYSQL_SSL_MODE:DISABLED}&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
    password:  ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        # Giữ đúng tên bảng trong @Table (vd. questionTag), không đổi thành question_tag
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

jwt:
  signerKey: ${JWT_SIGNER_KEY:jwtSecretKey12345678901234567890123456789012345678901234567890}
  expiration: 86400000
  refreshable-duration: 604800000
  temp-expiration: 3600000

admin:
  email: ${ADMIN_EMAIL:nguynhuphannguyen2004@gmail.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
